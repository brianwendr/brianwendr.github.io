<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Professional research framework for Industry 4.0 microservice quality assessment</title>
  <desc id="desc">A polished academic framework linking service ecosystem requirements, microservice architecture, data modeling, machine learning, reliability simulation, and service innovation governance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfcfe"/>
      <stop offset="0.56" stop-color="#f2f7fb"/>
      <stop offset="1" stop-color="#edf4f6"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#456789"/>
      <stop offset="1" stop-color="#477a66"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8eb"/>
      <stop offset="1" stop-color="#f1ead9"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="126%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#1f3039" flood-opacity="0.11"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#496987"/>
    </marker>
    <style>
      .bg{fill:url(#bg)}
      .header{fill:url(#header)}
      .lane{fill:#ffffff;stroke:#d4dee6;stroke-width:1.5;filter:url(#shadow)}
      .ecosystem{fill:#eff8f2;stroke:#4f8461;stroke-width:2}
      .system{fill:#f2f6fb;stroke:#496987;stroke-width:2}
      .method{fill:url(#gold);stroke:#aa8238;stroke-width:2}
      .impact{fill:#f4f7fc;stroke:#657d9c;stroke-width:2}
      .ribbon{fill:#ffffff;stroke:#cbd8df;stroke-width:1.4;filter:url(#shadow)}
      .line{fill:none;stroke:#496987;stroke-width:2.3;marker-end:url(#arrow)}
      .line-soft{fill:none;stroke:#8595a4;stroke-width:1.7;stroke-dasharray:6 7;marker-end:url(#arrow)}
      .title{font:800 31px Inter,Arial,sans-serif;fill:#ffffff}
      .subtitle{font:600 15px Inter,Arial,sans-serif;fill:#e5eef2}
      .lane-title{font:800 12px Inter,Arial,sans-serif;letter-spacing:1.2px;fill:#496987}
      .label{font:750 16px Inter,Arial,sans-serif;fill:#203039}
      .small{font:500 11.8px Inter,Arial,sans-serif;fill:#52616b}
      .micro{font:750 10.5px Inter,Arial,sans-serif;letter-spacing:.8px;fill:#596f86}
      .number{font:800 13px Inter,Arial,sans-serif;fill:#ffffff}
      .caption{font:600 12px Inter,Arial,sans-serif;fill:#61717c}
    </style>
  </defs>

  <rect class="bg" width="1280" height="760" rx="28"/>
  <rect class="header" x="34" y="32" width="1212" height="96" rx="22"/>
  <text class="title" x="70" y="78">Microservice Quality Assessment and Service Innovation</text>
  <text class="subtitle" x="70" y="106">Data modeling, computational learning, and reliability simulation for Industry 4.0 service systems</text>

  <rect class="lane" x="48" y="158" width="266" height="444" rx="18"/>
  <text class="lane-title" x="82" y="191">SERVICE ECOSYSTEM</text>

  <rect class="lane" x="360" y="158" width="266" height="444" rx="18"/>
  <text class="lane-title" x="394" y="191">ARCHITECTURE AND DATA</text>

  <rect class="lane" x="674" y="158" width="286" height="444" rx="18"/>
  <text class="lane-title" x="708" y="191">ANALYTICAL VALIDATION</text>

  <rect class="lane" x="1006" y="158" width="226" height="444" rx="18"/>
  <text class="lane-title" x="1040" y="191">RESEARCH CONTRIBUTION</text>

  <rect class="ecosystem" x="82" y="228" width="198" height="78" rx="14"/>
  <circle cx="105" cy="253" r="13" fill="#4f8461"/>
  <text class="number" x="101" y="258">1</text>
  <text class="label" x="128" y="251">S-D Logic</text>
  <text class="small" x="128" y="274">value co-creation</text>
  <text class="small" x="128" y="294">service exchange</text>

  <rect class="ecosystem" x="82" y="353" width="198" height="78" rx="14"/>
  <circle cx="105" cy="378" r="13" fill="#4f8461"/>
  <text class="number" x="101" y="383">2</text>
  <text class="label" x="128" y="376">Partner Needs</text>
  <text class="small" x="128" y="399">third-party criteria</text>
  <text class="small" x="128" y="419">integration needs</text>

  <rect class="ecosystem" x="82" y="478" width="198" height="78" rx="14"/>
  <circle cx="105" cy="503" r="13" fill="#4f8461"/>
  <text class="number" x="101" y="508">3</text>
  <text class="label" x="128" y="501">Industry 4.0</text>
  <text class="small" x="128" y="524">production data</text>
  <text class="small" x="128" y="544">manufacturing context</text>

  <rect class="system" x="394" y="218" width="198" height="72" rx="14"/>
  <text class="micro" x="422" y="245">SERVICE DESIGN</text>
  <text class="label" x="422" y="269">Microservice Layer</text>
  <text class="small" x="422" y="288">API service bundles</text>

  <rect class="system" x="394" y="341" width="198" height="72" rx="14"/>
  <text class="micro" x="422" y="368">PROCESS MODEL</text>
  <text class="label" x="422" y="392">Dynamic Flow</text>
  <text class="small" x="422" y="411">quality checkpoints</text>

  <rect class="system" x="394" y="464" width="198" height="72" rx="14"/>
  <text class="micro" x="422" y="491">FEATURE ENGINEERING</text>
  <text class="label" x="422" y="515">Reliability Space</text>
  <text class="small" x="422" y="534">failure metrics</text>

  <rect class="method" x="710" y="198" width="214" height="66" rx="14"/>
  <text class="micro" x="740" y="224">MODEL A</text>
  <text class="label" x="740" y="247">Data Modeling</text>

  <rect class="method" x="710" y="298" width="214" height="66" rx="14"/>
  <text class="micro" x="740" y="324">MODEL B</text>
  <text class="label" x="740" y="347">MLP Prediction</text>

  <rect class="method" x="710" y="398" width="214" height="66" rx="14"/>
  <text class="micro" x="740" y="424">MODEL C</text>
  <text class="label" x="740" y="447">Kaplan-Meier Test</text>

  <rect class="method" x="710" y="498" width="214" height="66" rx="14"/>
  <text class="micro" x="740" y="524">SYNTHESIS</text>
  <text class="label" x="740" y="547">Scenario Simulation</text>

  <rect class="impact" x="1038" y="218" width="160" height="72" rx="14"/>
  <text class="micro" x="1062" y="245">QUALITY</text>
  <text class="label" x="1062" y="269">Reliability</text>
  <text class="small" x="1062" y="288">risk diagnosis</text>

  <rect class="impact" x="1038" y="341" width="160" height="72" rx="14"/>
  <text class="micro" x="1062" y="368">SCALABILITY</text>
  <text class="label" x="1062" y="392">Innovation</text>
  <text class="small" x="1062" y="411">service redesign</text>

  <rect class="impact" x="1038" y="464" width="160" height="72" rx="14"/>
  <text class="micro" x="1062" y="491">GOVERNANCE</text>
  <text class="label" x="1062" y="515">Co-Creation</text>
  <text class="small" x="1062" y="534">partner alignment</text>

  <path class="line" d="M280 267 C322 267 342 254 394 254"/>
  <path class="line" d="M280 392 C322 392 342 377 394 377"/>
  <path class="line" d="M280 517 C322 517 342 500 394 500"/>
  <path class="line" d="M592 254 C650 254 660 231 710 231"/>
  <path class="line" d="M592 377 C650 372 660 331 710 331"/>
  <path class="line" d="M592 500 C650 486 660 431 710 431"/>
  <path class="line" d="M817 264 L817 298"/>
  <path class="line" d="M817 364 L817 398"/>
  <path class="line" d="M817 464 L817 498"/>
  <path class="line" d="M924 231 C972 231 990 254 1038 254"/>
  <path class="line" d="M924 331 C974 331 990 377 1038 377"/>
  <path class="line" d="M924 531 C974 531 990 500 1038 500"/>

  <rect class="ribbon" x="145" y="636" width="990" height="66" rx="18"/>
  <text class="micro" x="185" y="663">EVIDENCE AND CONTRIBUTION</text>
  <text class="label" x="185" y="687">Production-data validation</text>
  <text class="caption" x="430" y="687">MLP reliability prediction</text>
  <text class="caption" x="655" y="687">KM survival comparison</text>
  <text class="caption" x="870" y="687">reported 12% service-quality gain</text>
  <path class="line-soft" d="M790 636 C790 610 805 586 817 564"/>
</svg>
