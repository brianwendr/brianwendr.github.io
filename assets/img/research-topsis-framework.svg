<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Professional research framework for TOPSIS-based enterprise decision intelligence</title>
  <desc id="desc">A polished academic framework linking Industry 4.0 signals, decision constructs, TOPSIS analytics, validation, and managerial decisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfdfc"/>
      <stop offset="0.58" stop-color="#f2f8f6"/>
      <stop offset="1" stop-color="#ecf3f1"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f5f63"/>
      <stop offset="1" stop-color="#496d86"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9ec"/>
      <stop offset="1" stop-color="#f3ebd8"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="126%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#1f3032" flood-opacity="0.11"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2f6669"/>
    </marker>
    <style>
      .bg{fill:url(#bg)}
      .header{fill:url(#header)}
      .lane{fill:#ffffff;stroke:#d5e2df;stroke-width:1.5;filter:url(#shadow)}
      .node{fill:#ffffff;stroke:#c8d8d6;stroke-width:1.4}
      .context{fill:#eef8f5;stroke:#2f7874;stroke-width:2}
      .construct{fill:#f4faf8;stroke:#2f7874;stroke-width:2}
      .method{fill:url(#gold);stroke:#b48a39;stroke-width:2}
      .output{fill:#f1f5fb;stroke:#526f97;stroke-width:2}
      .ribbon{fill:#ffffff;stroke:#cbd9d8;stroke-width:1.4;filter:url(#shadow)}
      .line{fill:none;stroke:#2f6669;stroke-width:2.3;marker-end:url(#arrow)}
      .line-soft{fill:none;stroke:#8ba2a3;stroke-width:1.7;stroke-dasharray:6 7;marker-end:url(#arrow)}
      .title{font:800 31px Inter,Arial,sans-serif;fill:#ffffff}
      .subtitle{font:600 15px Inter,Arial,sans-serif;fill:#dcebea}
      .lane-title{font:800 12px Inter,Arial,sans-serif;letter-spacing:1.2px;fill:#2f6669}
      .label{font:750 16px Inter,Arial,sans-serif;fill:#203235}
      .small{font:500 11.8px Inter,Arial,sans-serif;fill:#526367}
      .micro{font:750 10.5px Inter,Arial,sans-serif;letter-spacing:.8px;fill:#547073}
      .number{font:800 13px Inter,Arial,sans-serif;fill:#ffffff}
      .caption{font:600 12px Inter,Arial,sans-serif;fill:#617477}
    </style>
  </defs>

  <rect class="bg" width="1280" height="760" rx="28"/>
  <rect class="header" x="34" y="32" width="1212" height="96" rx="22"/>
  <text class="title" x="70" y="78">TOPSIS-Based Enterprise Decision Intelligence</text>
  <text class="subtitle" x="70" y="106">A multi-criteria analytics framework for Industry 4.0 product and process design decisions</text>

  <rect class="lane" x="48" y="158" width="266" height="444" rx="18"/>
  <text class="lane-title" x="82" y="191">EMPIRICAL SIGNALS</text>

  <rect class="lane" x="360" y="158" width="266" height="444" rx="18"/>
  <text class="lane-title" x="394" y="191">DECISION CONSTRUCTS</text>

  <rect class="lane" x="674" y="158" width="286" height="444" rx="18"/>
  <text class="lane-title" x="708" y="191">TOPSIS ANALYTICAL CORE</text>

  <rect class="lane" x="1006" y="158" width="226" height="444" rx="18"/>
  <text class="lane-title" x="1040" y="191">MANAGERIAL OUTPUTS</text>

  <rect class="context" x="82" y="228" width="198" height="78" rx="14"/>
  <circle cx="105" cy="253" r="13" fill="#2f7874"/>
  <text class="number" x="101" y="258">1</text>
  <text class="label" x="128" y="251">Platform Data</text>
  <text class="small" x="128" y="274">cloud and process data</text>
  <text class="small" x="128" y="294">automation trace</text>

  <rect class="context" x="82" y="353" width="198" height="78" rx="14"/>
  <circle cx="105" cy="378" r="13" fill="#2f7874"/>
  <text class="number" x="101" y="383">2</text>
  <text class="label" x="128" y="376">R&amp;D Evidence</text>
  <text class="small" x="128" y="399">product design records</text>
  <text class="small" x="128" y="419">process performance data</text>

  <rect class="context" x="82" y="478" width="198" height="78" rx="14"/>
  <circle cx="105" cy="503" r="13" fill="#2f7874"/>
  <text class="number" x="101" y="508">3</text>
  <text class="label" x="128" y="501">Decision Ambiguity</text>
  <text class="small" x="128" y="524">conflicting criteria</text>
  <text class="small" x="128" y="544">uncertain priority</text>

  <rect class="construct" x="394" y="218" width="198" height="72" rx="14"/>
  <text class="micro" x="422" y="245">LATENT CAPABILITY</text>
  <text class="label" x="422" y="269">Core Capability</text>
  <text class="small" x="422" y="288">knowledge assets</text>

  <rect class="construct" x="394" y="341" width="198" height="72" rx="14"/>
  <text class="micro" x="422" y="368">MEDIATING STRUCTURE</text>
  <text class="label" x="422" y="392">Integration Level</text>
  <text class="small" x="422" y="411">modular maturity</text>

  <rect class="construct" x="394" y="464" width="198" height="72" rx="14"/>
  <text class="micro" x="422" y="491">DECISION LEVER</text>
  <text class="label" x="422" y="515">Resource Allocation</text>
  <text class="small" x="422" y="534">portfolio discipline</text>

  <rect class="method" x="710" y="198" width="214" height="66" rx="14"/>
  <text class="micro" x="740" y="224">STAGE A</text>
  <text class="label" x="740" y="247">Decision Matrix</text>

  <rect class="method" x="710" y="298" width="214" height="66" rx="14"/>
  <text class="micro" x="740" y="324">STAGE B</text>
  <text class="label" x="740" y="347">Criteria Weighting</text>

  <rect class="method" x="710" y="398" width="214" height="66" rx="14"/>
  <text class="micro" x="740" y="424">STAGE C</text>
  <text class="label" x="740" y="447">Ideal Distance</text>

  <rect class="method" x="710" y="498" width="214" height="66" rx="14"/>
  <text class="micro" x="740" y="524">STAGE D</text>
  <text class="label" x="740" y="547">Closeness Ranking</text>

  <rect class="output" x="1038" y="218" width="160" height="72" rx="14"/>
  <text class="micro" x="1062" y="245">STRATEGY</text>
  <text class="label" x="1062" y="269">Product Path</text>
  <text class="small" x="1062" y="288">innovation priority</text>

  <rect class="output" x="1038" y="341" width="160" height="72" rx="14"/>
  <text class="micro" x="1062" y="368">OPERATIONS</text>
  <text class="label" x="1062" y="392">Process Path</text>
  <text class="small" x="1062" y="411">optimization option</text>

  <rect class="output" x="1038" y="464" width="160" height="72" rx="14"/>
  <text class="micro" x="1062" y="491">GOVERNANCE</text>
  <text class="label" x="1062" y="515">Priority Set</text>
  <text class="small" x="1062" y="534">ranked actions</text>

  <path class="line" d="M280 267 C322 267 342 254 394 254"/>
  <path class="line" d="M280 392 C322 392 342 377 394 377"/>
  <path class="line" d="M280 517 C322 517 342 500 394 500"/>
  <path class="line" d="M592 254 C650 254 660 231 710 231"/>
  <path class="line" d="M592 377 C650 372 660 331 710 331"/>
  <path class="line" d="M592 500 C650 486 660 431 710 431"/>
  <path class="line" d="M817 264 L817 298"/>
  <path class="line" d="M817 364 L817 398"/>
  <path class="line" d="M817 464 L817 498"/>
  <path class="line" d="M924 231 C972 231 990 254 1038 254"/>
  <path class="line" d="M924 431 C974 424 990 377 1038 377"/>
  <path class="line" d="M924 531 C974 531 990 500 1038 500"/>

  <rect class="ribbon" x="145" y="636" width="990" height="66" rx="18"/>
  <text class="micro" x="185" y="663">VALIDATION AND CONTRIBUTION</text>
  <text class="label" x="185" y="687">Enterprise data calibration</text>
  <text class="caption" x="400" y="687">scenario comparison</text>
  <text class="caption" x="585" y="687">decision-support diagnostics</text>
  <text class="caption" x="825" y="687">reported design-efficiency improvement</text>
  <path class="line-soft" d="M790 636 C790 610 805 586 817 564"/>
</svg>
